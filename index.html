<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>百名山・二百名山・三百名山 赤色立体地図スライドショー/Japan 100 Famous Mountains – Red Relief Map</title>

  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: #111;
      color: #fff;
      text-align: center;
    }

    header {
      padding: 10px;
      background: #222;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      align-items: center;
    }

    select, button {
      font-size: 16px;
      padding: 6px 10px;
      border-radius: 6px;
      border: none;
    }

    button {
      cursor: pointer;
    }

    #title {
      margin: 8px 0;
      font-size: 18px;
    }

    #slideArea {
      width: 100vw;
      height: calc(100vh - 100px);
      display: flex;
      justify-content: center;
      align-items: center;
      background: #000;
    }

    #slideImage {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }

    #counter {
      font-size: 14px;
      color: #ccc;
      margin-bottom: 6px;
    }
  </style>
</head>

<body>

<header>
  <label>
    山リスト/ Mountain List：
    <select id="categorySelect">
      <option value="100c">日本百名山/ Japan 100 Famous Mountains</option>
      <option value="200c">日本二百名山/ Japan 200 Famous Mountains</option>
      <option value="300c">日本三百名山/ Japan 300 Famous Mountains</option>
    </select>
  </label>

  <label>
    速度/ Speed：
    <select id="speedSelect">
      <option value="5000">ゆっくり/ Slow</option>
      <option value="3000">普通/ Normal</option>
      <option value="1500" selected>速い/ Fast</option>
      <option value="800">爆速/ Ultra Fast</option>
    </select>
  </label>

  <button id="prevBtn">前へ/Prev</button>
  <button id="playBtn">再生/Play</button>
  <button id="nextBtn">次へ/Next</button>
</header>

<div id="title">読み込み中...</div>

<div id="slideArea">
  <img id="slideImage" src="" alt="山の赤色立体地図 Mountains – Red Relief Map" />
</div>

<div id="counter"></div>

<script>
  const categorySelect = document.getElementById("categorySelect");
  const speedSelect = document.getElementById("speedSelect");
  const slideImage = document.getElementById("slideImage");
  const titleText = document.getElementById("title");
  const counter = document.getElementById("counter");

  const playBtn = document.getElementById("playBtn");
  const prevBtn = document.getElementById("prevBtn");
  const nextBtn = document.getElementById("nextBtn");

  let images = [];
  let currentIndex = 0;
  let timer = null;
  let isPlaying = false;

  async function loadCategory(category) {
    stopSlideShow();

    currentIndex = 0;
    images = [];

    titleText.textContent = "読み込み中...";
    slideImage.src = "";
    counter.textContent = "";

    try {
      const response = await fetch(`${category}/manifest.json`);
      images = await response.json();

      if (images.length === 0) {
        titleText.textContent = "画像がありません/ No Image Available";
        return;
      }

      showSlide();
    } catch (error) {
      titleText.textContent = "manifest.json を読み込めません/ Failed to Load";
      console.error(error);
    }
  }

  function showSlide() {
    const category = categorySelect.value;
    const fileName = images[currentIndex];

    slideImage.src = `${category}/${fileName}`;

    const cleanName = fileName
      .replace(/\.[^/.]+$/, "")
      .replace(/_/g, " ");

    titleText.textContent = cleanName;
    counter.textContent = `${currentIndex + 1} / ${images.length}`;
  }

  function nextSlide() {
    if (images.length === 0) return;
    currentIndex = (currentIndex + 1) % images.length;
    showSlide();
  }

  function prevSlide() {
    if (images.length === 0) return;
    currentIndex = (currentIndex - 1 + images.length) % images.length;
    showSlide();
  }

  function startSlideShow() {
    if (isPlaying) return;

    isPlaying = true;
    playBtn.textContent = "停止/ Stop";

    const speed = Number(speedSelect.value);
    timer = setInterval(nextSlide, speed);
  }

  function stopSlideShow() {
    isPlaying = false;
    playBtn.textContent = "再生/ Play";

    if (timer) {
      clearInterval(timer);
      timer = null;
    }
  }

  playBtn.addEventListener("click", () => {
    if (isPlaying) {
      stopSlideShow();
    } else {
      startSlideShow();
    }
  });

  nextBtn.addEventListener("click", () => {
    stopSlideShow();
    nextSlide();
  });

  prevBtn.addEventListener("click", () => {
    stopSlideShow();
    prevSlide();
  });

  categorySelect.addEventListener("change", () => {
    loadCategory(categorySelect.value);
  });

  speedSelect.addEventListener("change", () => {
    if (isPlaying) {
      stopSlideShow();
      startSlideShow();
    }
  });

    loadCategory("100c").then(() => {
    startSlideShow();
  });
</script>

</body>
</html>
